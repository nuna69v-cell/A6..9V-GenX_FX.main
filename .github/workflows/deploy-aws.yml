name: Deploy AWS Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'deploy/aws-free-tier-deploy.yml'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:

permissions:
  id-token: write # Required for requesting the JWT
  contents: read  # Required for actions/checkout

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Use OIDC for safer authentication instead of long-lived access keys if configured
          # role-to-assume: arn:aws:iam::111122223333:role/github-actions-role
          # Alternatively, use secrets if OIDC is not set up
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy CloudFormation Stack
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: HotIronInfrastructure
          template: deploy/aws-free-tier-deploy.yml
          capabilities: CAPABILITY_IAM
          no-fail-on-empty-changeset: "1"
